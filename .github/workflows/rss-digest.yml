name: RSS Digest

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install feedparser httpx beautifulsoup4 python-dateutil jinja2 openai
      
      - name: Run RSS reader
        id: rss
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          ENABLE_CONTENT_FILTER: 'true'
        run: |
          python rss_reader.py --webhook "$WECOM_WEBHOOK_URL" --days 1
      
      - name: Push to Server酱
        env:
          SCT_KEY: ${{ secrets.SCT_KEY }}
        run: |
          LATEST=$(ls -t docs/*.html 2>/dev/null | head -1)
          if [ -z "$LATEST" ]; then echo "No HTML found"; exit 0; fi
          TITLE="Karpathy RSS Digest $(date '+%Y-%m-%d')"
          DESP=$(python3 -c "
import sys, re, json
content = open('$LATEST').read()
articles = re.findall(r'<h[23]>(.*?)</h[23]>', content)
summary = chr(10).join([f'{i+1}. {a}' for i,a in enumerate(articles[:20])])
print(json.dumps({'title': '$TITLE', 'desp': summary[:30000]}))
")
          curl -s -X POST "https://sctapi.ftqq.com/${SCT_KEY}.send" \
            -H "Content-Type: application/json" \
            -d "$DESP"
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: 更新 RSS 精选内容 [skip ci]"
          git push